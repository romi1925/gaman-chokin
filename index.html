<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐷 がまん貯金</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Zen Maru Gothic', sans-serif; background: #FFF0F5; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    @keyframes popIn {
      0%   { transform: scale(0.6); opacity: 0; }
      65%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-56px) scale(1.15); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pigWiggle {
      0%,100% { transform: rotate(0deg); }
      25%  { transform: rotate(-6deg); }
      75%  { transform: rotate(6deg); }
    }
    @keyframes rainbow {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    .shake     { animation: shake 0.45s ease; }
    .pop       { animation: popIn 0.4s cubic-bezier(.22,.68,0,1.4) both; }
    .float-msg { animation: floatUp 2.4s ease forwards; }
    .slide     { animation: slideDown 0.3s ease both; }
    .wiggle    { animation: pigWiggle 0.5s ease infinite; }
    .celebrate { animation: rainbow 1s linear infinite; }
    input:focus { outline: none; }
    .btn:hover  { filter: brightness(1.07); }
    .btn:active { transform: scale(0.95) !important; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #FFB6C1; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const GOAL = 1_000_000;
    const COIN_COLORS = ["#FFD700", "#FFC107", "#FFB300", "#FF8F00", "#FFCA28"];

    // ── ストレージ（localStorage使用）──
    const storage = {
      get: (key) => {
        try { const v = localStorage.getItem(key); return v ? { value: v } : null; } catch { return null; }
      },
      set: (key, value) => {
        try { localStorage.setItem(key, value); } catch {}
      },
    };

    // ── かわいい豚SVG ──
    function CutePigSVG({ fillPercent = 0, size = 180, mini = false }) {
      const bodyBot = 90;
      const bodyH = 54;
      const waterY = bodyBot - (fillPercent / 100) * bodyH;
      const id = mini ? "mini" : "main";

      return (
        <svg viewBox="0 0 100 100" width={size} height={size} style={{ display: "block", overflow: "visible" }}>
          <defs>
            <clipPath id={id + "Body"}>
              <ellipse cx="50" cy="63" rx="32" ry="27" />
            </clipPath>
            {!mini && (
              <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#FFD700" stopOpacity="0.7" />
                <stop offset="100%" stopColor="#FFA500" stopOpacity="0.5" />
              </linearGradient>
            )}
          </defs>

          <ellipse cx="50" cy="97" rx="26" ry="4" fill="#e8a0b044" />
          <path d="M20 62 Q8 58 11 50 Q14 42 21 47" fill="none" stroke={mini ? "#F48FB1" : "#F06292"} strokeWidth={mini ? 2 : 2.5} strokeLinecap="round" />
          <ellipse cx="50" cy="63" rx="32" ry="27" fill={mini ? "#FFCDD2" : "#FFB6C1"} stroke={mini ? "#F48FB1" : "#F06292"} strokeWidth={mini ? 1.5 : 2} />

          {fillPercent > 0 && !mini && (
            <rect x="18" y={waterY} width="64" height={bodyBot - waterY + 2}
              fill="url(#waterGrad)" clipPath="url(#mainBody)" />
          )}

          {[28, 39, 53, 64].map((x, i) => (
            <rect key={i} x={x} y={mini ? 84 : 83} width={mini ? 9 : 10} height={mini ? 10 : 12} rx={mini ? 4 : 5}
              fill={mini ? "#FFCDD2" : "#FFB6C1"} stroke={mini ? "#F48FB1" : "#F06292"} strokeWidth={mini ? 1 : 1.5} />
          ))}

          <circle cx="72" cy="52" r={mini ? 19 : 21} fill={mini ? "#FFCDD2" : "#FFB6C1"} stroke={mini ? "#F48FB1" : "#F06292"} strokeWidth={mini ? 1.5 : 2} />
          <ellipse cx="65" cy="34" rx={mini ? 6 : 7} ry={mini ? 8 : 9} fill={mini ? "#F48FB1" : "#F06292"} />
          <ellipse cx="65" cy="36" rx={mini ? 3.5 : 4} ry={mini ? 5 : 6} fill={mini ? "#FFE4E8" : "#FFD6E0"} />
          <ellipse cx="86" cy="57" rx={mini ? 8 : 9} ry={mini ? 6.5 : 7.5} fill={mini ? "#F48FB1" : "#F06292"} stroke={mini ? "#E57399" : "#E91E63"} strokeWidth="1" />
          <circle cx="83" cy="55" r={mini ? 1.8 : 2} fill={mini ? "#AD1457" : "#880E4F"} />
          <circle cx="89" cy="55" r={mini ? 1.8 : 2} fill={mini ? "#AD1457" : "#880E4F"} />
          <circle cx="70" cy="45" r={mini ? 4 : 5} fill="white" />
          <circle cx="71" cy="45" r={mini ? 2.2 : 2.8} fill="#1a1a2e" />
          <circle cx="72" cy="43.5" r={mini ? 0.9 : 1.2} fill="white" />
          {!mini && <ellipse cx="62" cy="53" rx="4" ry="2.5" fill="#FF8FAA" opacity="0.4" />}
          <rect x={mini ? 66 : 65} y={mini ? 32 : 30} width={mini ? 12 : 14} height={mini ? 3.5 : 4} rx="2"
            fill={mini ? "#E57399" : "#C2185B"} stroke={mini ? "#AD1457" : "#880E4F"} strokeWidth="0.8" />
        </svg>
      );
    }

    function CompletedPig() {
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
          <div style={{ position: "relative" }}>
            <CutePigSVG size={44} mini={true} fillPercent={100} />
            <div style={{ position: "absolute", top: -6, left: "50%", transform: "translateX(-50%)", fontSize: 12, lineHeight: 1 }}>👑</div>
          </div>
          <div style={{ fontSize: 9, fontWeight: 800, color: "#d45c7a", letterSpacing: 0.3 }}>+100万</div>
        </div>
      );
    }

    const formatDate = (ts) => {
      const d = new Date(ts);
      return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
    };

    function App() {
      const [coins, setCoins]         = useState([]);
      const [input, setInput]         = useState("");
      const [label, setLabel]         = useState("");
      const [shake, setShake]         = useState(false);
      const [flash, setFlash]         = useState(null);
      const [loaded, setLoaded]       = useState(false);
      const [celebrate, setCelebrate] = useState(false);
      const inputRef = useRef(null);

      useEffect(() => {
        const r = storage.get("piggy_coins");
        if (r?.value) {
          try { setCoins(JSON.parse(r.value)); } catch {}
        }
        setLoaded(true);
      }, []);

      useEffect(() => {
        if (!loaded) return;
        storage.set("piggy_coins", JSON.stringify(coins));
      }, [coins, loaded]);

      const total         = coins.reduce((s, c) => s + c.amount, 0);
      const completedPigs = Math.floor(total / GOAL);
      const currentAmt    = total % GOAL;
      const fillPercent   = Math.min(100, (currentAmt / GOAL) * 100);

      const handleAdd = () => {
        const num = parseInt(input.replace(/,/g, ""), 10);
        if (!num || num <= 0 || num > 9_999_999) {
          setShake(true); setTimeout(() => setShake(false), 500); return;
        }
        const prevCompleted = Math.floor(total / GOAL);
        const newCoin = { id: Date.now(), amount: num, label: label.trim() || null, ts: Date.now() };
        setCoins(prev => [...prev, newCoin]);

        const newCompleted = Math.floor((total + num) / GOAL);
        if (newCompleted > prevCompleted) {
          setCelebrate(true);
          setTimeout(() => setCelebrate(false), 3000);
          setFlash("🎉 100万円達成！豚が増えた！");
        } else {
          setFlash(`+¥${num.toLocaleString()} 貯金した！`);
        }
        setInput(""); setLabel("");
        inputRef.current?.focus();
        setTimeout(() => setFlash(null), 2400);
      };

      const handleDelete = (id) => setCoins(prev => prev.filter(c => c.id !== id));

      return (
        <div style={{
          minHeight: "100vh",
          background: "linear-gradient(145deg, #FFF0F5 0%, #FFE2EF 45%, #FFF3E0 100%)",
          padding: "14px 12px 50px",
        }}>
          <div style={{ maxWidth: 390, margin: "0 auto" }}>

            {/* Header */}
            <div style={{ textAlign: "center", marginBottom: 6 }}>
              <h1 style={{ fontSize: 22, fontWeight: 900, color: "#D81B60", letterSpacing: 2, textShadow: "0 2px 10px #f48fb144" }}>
                🐷 がまん貯金
              </h1>
              <p style={{ fontSize: 11, color: "#E91E8C", marginTop: 2 }}>我慢したお金を貯めよう！目標：¥1,000,000</p>
            </div>

            {/* Completed pigs */}
            {completedPigs > 0 && (
              <div style={{
                display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center",
                background: "white", borderRadius: 18, padding: "10px 12px",
                boxShadow: "0 3px 14px #f48fb122", marginBottom: 10,
              }}>
                <div style={{ width: "100%", fontSize: 11, fontWeight: 700, color: "#d45c7a", textAlign: "center", marginBottom: 4 }}>
                  🏆 満タン達成！
                </div>
                {Array.from({ length: completedPigs }).map((_, i) => (
                  <CompletedPig key={i} />
                ))}
              </div>
            )}

            {/* Pig illustration */}
            <div style={{ position: "relative", display: "flex", justifyContent: "center" }}>
              <div className={celebrate ? "wiggle celebrate" : ""}>
                <CutePigSVG fillPercent={fillPercent} size={190} />
              </div>
              <div style={{
                position: "absolute", bottom: 10, left: "50%", transform: "translateX(-50%)",
                background: fillPercent >= 80 ? "linear-gradient(135deg,#FF6B9D,#FF8FA3)" : "white",
                color: fillPercent >= 80 ? "white" : "#D81B60",
                borderRadius: 20, padding: "4px 14px",
                fontWeight: 900, fontSize: 13,
                boxShadow: "0 2px 10px #f48fb144", border: "2px solid #FFB6C1", whiteSpace: "nowrap",
              }}>
                {fillPercent.toFixed(1)}% {fillPercent >= 100 ? "🎉" : fillPercent >= 75 ? "💪" : fillPercent >= 50 ? "😊" : "🌱"}
              </div>
              {flash && (
                <div className="float-msg" style={{
                  position: "absolute", top: 16, left: "50%",
                  background: celebrate ? "linear-gradient(135deg,#FF6B9D,#FFAB40)" : "#D81B60",
                  color: "white", borderRadius: 22, padding: "8px 20px",
                  fontWeight: 900, fontSize: 14, whiteSpace: "nowrap",
                  boxShadow: "0 4px 18px #d81b6055", pointerEvents: "none", zIndex: 10,
                }}>
                  {flash}
                </div>
              )}
            </div>

            {/* Total */}
            <div className="pop" key={completedPigs + "-" + Math.floor(fillPercent)} style={{
              background: "linear-gradient(135deg, #E91E8C, #FF6B9D)",
              borderRadius: 22, padding: "14px 20px", marginBottom: 14, textAlign: "center",
              boxShadow: "0 6px 22px #E91E8C44",
            }}>
              <div style={{ fontSize: 10, color: "#ffe4ee", fontWeight: 600, letterSpacing: 2, marginBottom: 2 }}>合計貯金額</div>
              <div style={{ fontSize: 36, fontWeight: 900, color: "white", lineHeight: 1.1, letterSpacing: 1 }}>
                ¥{total.toLocaleString()}
              </div>
              <div style={{ fontSize: 11, color: "#ffe4ee", marginTop: 4 }}>
                {coins.length}回 我慢した！💪　現在：¥{currentAmt.toLocaleString()} / ¥1,000,000
              </div>
              <div style={{ marginTop: 10, background: "#fff4", borderRadius: 10, height: 8, overflow: "hidden" }}>
                <div style={{
                  height: "100%", borderRadius: 10,
                  background: "linear-gradient(90deg, #FFF176, #FFD700)",
                  width: `${fillPercent}%`,
                  transition: "width 0.6s cubic-bezier(.22,.68,0,1.4)",
                  boxShadow: "0 0 8px #FFD70099",
                }} />
              </div>
            </div>

            {/* Input */}
            <div style={{
              background: "white", borderRadius: 22, padding: "16px 15px",
              boxShadow: "0 4px 18px #f48fb122", marginBottom: 14,
            }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#D81B60", marginBottom: 10 }}>
                💰 いくら我慢した？
              </div>
              <div className={shake ? "shake" : ""} style={{ marginBottom: 10 }}>
                <div style={{
                  display: "flex", alignItems: "center",
                  background: "#FFF0F5", borderRadius: 14,
                  border: "2px solid #FFB6C1", padding: "0 14px",
                }}>
                  <span style={{ color: "#D81B60", fontWeight: 900, fontSize: 20, marginRight: 6, flexShrink: 0 }}>¥</span>
                  <input
                    ref={inputRef}
                    type="text"
                    inputMode="numeric"
                    value={input}
                    onChange={e => {
                      const raw = e.target.value.replace(/[^\d]/g, "");
                      if (raw === "") { setInput(""); return; }
                      const num = parseInt(raw, 10);
                      if (num > 9_999_999) return;
                      setInput(num.toLocaleString("ja-JP"));
                    }}
                    onKeyDown={e => e.key === "Enter" && handleAdd()}
                    placeholder="1,080"
                    style={{
                      flex: 1, border: "none", background: "transparent",
                      fontSize: 22, fontWeight: 800, color: "#333",
                      fontFamily: "inherit", padding: "10px 0", minWidth: 0,
                    }}
                  />
                </div>
              </div>
              <input
                type="text"
                value={label}
                onChange={e => setLabel(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleAdd()}
                placeholder="何を我慢した？（例：麻辣湯）"
                maxLength={30}
                style={{
                  width: "100%", border: "2px solid #FFB6C1", borderRadius: 12,
                  background: "#FFF0F5", padding: "10px 14px", fontSize: 13,
                  color: "#555", fontFamily: "inherit", marginBottom: 12,
                }}
              />
              <button
                className="btn"
                onClick={handleAdd}
                style={{
                  width: "100%",
                  background: "linear-gradient(135deg, #E91E8C, #FF6B9D)",
                  border: "none", borderRadius: 14, padding: "13px 0",
                  color: "white", fontSize: 16, fontWeight: 900,
                  cursor: "pointer", letterSpacing: 1,
                  boxShadow: "0 4px 16px #E91E8C44",
                  fontFamily: "inherit", transition: "transform 0.1s, filter 0.1s",
                }}
              >
                🐷 貯金する
              </button>
            </div>

            {/* History */}
            {coins.length > 0 && (
              <div style={{ background: "white", borderRadius: 22, padding: "16px 14px", boxShadow: "0 4px 18px #f48fb122" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#D81B60", marginBottom: 10 }}>
                  📅 我慢の記録
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 7, maxHeight: 320, overflowY: "auto", paddingRight: 2 }}>
                  {[...coins].reverse().map((c, i) => (
                    <div key={c.id} className={i === 0 ? "slide" : ""} style={{
                      display: "flex", alignItems: "center", gap: 9,
                      background: "#FFF5F8", borderRadius: 13, padding: "9px 11px",
                    }}>
                      <div style={{
                        width: 32, height: 32, borderRadius: "50%", flexShrink: 0,
                        background: `radial-gradient(circle at 35% 35%, ${COIN_COLORS[i % 5]}, ${COIN_COLORS[i % 5]}88)`,
                        display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14,
                      }}>💰</div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 800, fontSize: 14, color: "#333" }}>
                          ¥{c.amount.toLocaleString()}
                        </div>
                        {c.label && (
                          <div style={{ fontSize: 11, color: "#aaa", marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                            {c.label}
                          </div>
                        )}
                      </div>
                      <div style={{ fontSize: 10, color: "#ccc", flexShrink: 0, marginRight: 2 }}>
                        {formatDate(c.ts)}
                      </div>
                      <button
                        onClick={() => handleDelete(c.id)}
                        style={{ background: "none", border: "none", cursor: "pointer", color: "#ffb6c1", fontSize: 14, padding: "2px 4px", lineHeight: 1, flexShrink: 0, transition: "color 0.15s" }}
                        onMouseEnter={e => e.currentTarget.style.color = "#D81B60"}
                        onMouseLeave={e => e.currentTarget.style.color = "#ffb6c1"}
                      >✕</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {coins.length === 0 && loaded && (
              <div style={{ textAlign: "center", color: "#f48fb1", fontSize: 13, padding: "12px" }}>
                最初の我慢を記録してみよう！🌸
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
